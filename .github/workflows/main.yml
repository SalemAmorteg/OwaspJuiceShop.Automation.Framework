name: Dual-Language QA Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # --- PYTHON AUTOMATION JOB ---
  python-tests:
    name: Playwright Python (Primary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        # Note: Ensure python/requirements.txt exists in your repo
        run: |
          python -m pip install --upgrade pip
          pip install -r python/requirements.txt

      - name: Ensure Playwright Browsers
        run: playwright install --with-deps chromium

      - name: Run Python Tests
        run: pytest python/tests --alluredir=allure-results
        continue-on-error: true 

      - name: Upload Python Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-results
          path: allure-results

  # --- C# AUTOMATION JOB ---
  csharp-tests:
    name: Playwright C# (Platform E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore csharp/OwaspJuiceShop.Tests.sln

      - name: Install Playwright Browsers
        run: |
          dotnet build csharp/OwaspJuiceShop.Tests.sln
          pwsh csharp/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run C# Tests
        run: dotnet test csharp/OwaspJuiceShop.Tests.sln --configuration Release --no-build --logger:"trx;LogFileName=csharp-results.trx"
        continue-on-error: true

      - name: Upload C# Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: csharp-results
          path: csharp/TestResults

  # --- REPORTING JOB ---
  generate-report:
    name: Allure Reporting
    needs: [python-tests, csharp-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        
      - name: Consolidate Results
        run: echo "Ready to aggregate Python and C# results into a unified dashboard."